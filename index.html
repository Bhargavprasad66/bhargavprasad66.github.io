<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bhargav Prasad — Data Analyst Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0B0E14;
  --card:#141926;
  --text:#F3F1EA;
  --muted:#A9AEBC;
  --accent:#7FB8A6;
  --border:rgba(255,255,255,0.08);
}

body.light{
  --bg:#f5f6fa;
  --text:#111;
  --muted:#444;
  --card:#ffffff;
  --border:rgba(0,0,0,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter;
  transition:.3s ease;
}

.wrap{max-width:1100px;margin:auto;padding:0 24px}

/* NAV */
nav{
  position:sticky;top:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  z-index:10;
}
.nav-inner{
  display:flex;
  justify-content:space-between;
  padding:14px 0;
  font-family:JetBrains Mono;
}

button{
  background:none;
  border:1px solid var(--border);
  color:var(--text);
  padding:6px 12px;
  cursor:pointer;
  border-radius:6px;
}

/* HERO */
.hero{padding:70px 0;border-bottom:1px solid var(--border)}
h1{font-family:Fraunces;font-size:52px}
.hero p{color:var(--muted);max-width:520px;margin-top:10px}

/* KPI */
.kpi{
  display:flex;
  gap:20px;
  margin-top:30px;
  flex-wrap:wrap;
}
.kpi-box{
  background:var(--card);
  border:1px solid var(--border);
  padding:18px;
  border-radius:10px;
  min-width:140px;
}
.kpi-num{
  font-size:28px;
  font-weight:600;
  color:var(--accent);
}

/* FILTER */
.filters{
  display:flex;
  gap:10px;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.filter-btn{
  font-family:JetBrains Mono;
  font-size:12px;
  padding:6px 12px;
  border:1px solid var(--border);
  cursor:pointer;
  border-radius:20px;
}
.filter-btn.active{
  background:var(--accent);
  color:#000;
}

/* PROJECT */
.project{
  display:grid;
  grid-template-columns:1fr 1.5fr;
  gap:28px;
  margin-bottom:40px;
  opacity:1;
  transition:.4s ease;
}

.project.hide{
  opacity:0;
  transform:scale(0.95);
  pointer-events:none;
}

.thumb{
  border-radius:10px;
  overflow:hidden;
  border:1px solid var(--border);
  cursor:pointer;
}

.thumb img{
  height:220px;
  width:100%;
  object-fit:cover;
  transition:.4s ease;
}

.thumb:hover img{transform:scale(1.08)}

.tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.tag{
  font-family:JetBrains Mono;
  font-size:11px;
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:20px;
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
}
#lightbox.show{display:flex}
#lightbox img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
  border:2px solid var(--accent);
}
</style>
</head>

<body>

<nav>
  <div class="wrap nav-inner">
    <div>BHARGAV.PRASAD</div>
    <button onclick="toggleTheme()">Toggle Theme</button>
  </div>
</nav>

<header class="hero wrap">
  <h1>Munugala Bhargav Prasad</h1>
  <p>Data Analyst turning raw datasets into actionable dashboards.</p>

  <div class="kpi">
    <div class="kpi-box">
      <div class="kpi-num" data-target="100">0</div>
      Projects
    </div>
    <div class="kpi-box">
      <div class="kpi-num" data-target="4">0</div>
      Domains
    </div>
    <div class="kpi-box">
      <div class="kpi-num" data-target="6">0</div>
      Certs
    </div>
  </div>
</header>

<section class="wrap">

<h2>Projects</h2>

<div class="filters">
  <div class="filter-btn active" onclick="filter('all')">All</div>
  <div class="filter-btn" onclick="filter('sql')">SQL</div>
  <div class="filter-btn" onclick="filter('powerbi')">Power BI</div>
  <div class="filter-btn" onclick="filter('excel')">Excel</div>
</div>

<!-- PROJECTS -->

<div class="project" data-tags="sql powerbi excel">
  <div class="thumb"><img src="assets/projects/olist.jpg" onclick="openLightbox(this.src)"></div>
  <div>
    <h3>Olist E-Commerce Analytics</h3>
    <div class="tags"><span class="tag">SQL</span><span class="tag">Power BI</span></div>
  </div>
</div>

<div class="project" data-tags="sql powerbi">
  <div class="thumb"><img src="assets/projects/hr.jpg" onclick="openLightbox(this.src)"></div>
  <div>
    <h3>HR Analytics</h3>
    <div class="tags"><span class="tag">SQL</span><span class="tag">Power BI</span></div>
  </div>
</div>

</section>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg">
</div>

<script>

/* LIGHTBOX */
function openLightbox(src){
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("show");
}

/* FILTER */
function filter(tag){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  document.querySelectorAll('.project').forEach(p=>{
    if(tag==='all' || p.dataset.tags.includes(tag)){
      p.classList.remove('hide');
    }else{
      p.classList.add('hide');
    }
  });
}

/* KPI COUNTER */
const counters = document.querySelectorAll('.kpi-num');
counters.forEach(counter=>{
  const update = ()=>{
    const target = +counter.dataset.target;
    const current = +counter.innerText;
    const step = target/40;
    if(current < target){
      counter.innerText = Math.ceil(current + step);
      setTimeout(update,30);
    }else{
      counter.innerText = target;
    }
  }
  update();
});

/* THEME */
function toggleTheme(){
  document.body.classList.toggle('light');
}

</script>

</body>
</html>
